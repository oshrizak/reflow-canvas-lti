name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: System deps (ocrmypdf, pdf2image)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr ghostscript poppler-utils qpdf unpaper

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check connector tests

      - name: Mypy
        run: mypy connector

      - name: Pytest
        run: pytest tests/

      # Dependency CVE scan (ISO 27001 Annex A 8.8 — Management of
      # technical vulnerabilities). ``continue-on-error`` keeps the
      # build green during the initial rollout; findings show up in
      # the PR's check output and can be triaged. Tighten to a
      # blocking step once the baseline is clean — drop the
      # ``continue-on-error`` and pip-audit will fail the build on
      # any new advisory.
      - name: pip-audit (CVE scan)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --strict
